<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Career Navigator | Assessment</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1d2b3e", // Deep Slate
                        "secondary": "#505f76", // Soft Slate
                        "tertiary": "#004944", // Deep Teal
                        "accent": "#80d5cb", // Soft Teal
                        "background": "#fdfcfb", // Bone White
                        "surface": "#ffffff",
                        "outline": "#e2e8f0"
                    },
                    fontFamily: {
                        "serif": ["Cormorant Garamond", "serif"],
                        "sans": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .rating-line::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e2e8f0;
            z-index: 0;
        }
        .step-indicator {
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body class="bg-background text-primary font-sans antialiased">
<!-- Minimal Progress Bar at the very top -->
<div class="fixed top-0 left-0 w-full h-1 bg-outline/30 z-50">
<div class="h-full bg-primary/40 w-[25%] transition-all duration-1000 ease-out"></div>
</div>
<main class="min-h-screen flex flex-col items-center justify-center px-6 py-12">
<!-- Step Indicator -->
<div class="mb-16 text-center">
<span class="step-indicator text-[10px] uppercase font-semibold text-secondary/60 block mb-2">Assessment Journey</span>
<div class="flex items-baseline justify-center gap-1">
<span class="font-serif italic text-2xl text-primary">Step</span>
<span class="font-serif text-4xl font-light">12</span>
<span class="font-serif italic text-xl text-secondary/40 px-2">of</span>
<span class="font-serif text-2xl text-secondary/60">48</span>
</div>
</div>
<!-- Question Section -->
<div class="w-full max-w-4xl text-center">
<h1 class="font-serif text-4xl md:text-6xl lg:text-7xl font-light leading-tight mb-24 max-w-3xl mx-auto tracking-tight">
                “I enjoy building or <span class="italic">repairing</span> things with my hands.”
            </h1>
<!-- Abstract Rating Scale -->
<div class="relative w-full max-w-2xl mx-auto mb-32">
<div class="rating-line"></div>
<div class="relative z-10 flex justify-between items-center">
<!-- Disagree - Smallest Circle -->
<button class="group flex flex-col items-center gap-6">
<div class="w-4 h-4 rounded-full border border-primary/20 bg-background group-hover:scale-150 group-hover:bg-primary group-hover:border-primary transition-all duration-500"></div>
<span class="text-[9px] uppercase tracking-[0.2em] font-medium text-secondary/0 group-hover:text-secondary/60 transition-all duration-500 absolute -bottom-10">Strongly Disagree</span>
</button>
<!-- Disagree - Small Circle -->
<button class="group flex flex-col items-center gap-6">
<div class="w-6 h-6 rounded-full border border-primary/20 bg-background group-hover:scale-125 group-hover:bg-primary group-hover:border-primary transition-all duration-500"></div>
<span class="text-[9px] uppercase tracking-[0.2em] font-medium text-secondary/0 group-hover:text-secondary/60 transition-all duration-500 absolute -bottom-10">Disagree</span>
</button>
<!-- Neutral - Medium Circle -->
<button class="group flex flex-col items-center gap-6">
<div class="w-8 h-8 rounded-full border border-primary/20 bg-background group-hover:bg-primary group-hover:border-primary transition-all duration-500"></div>
<span class="text-[9px] uppercase tracking-[0.2em] font-medium text-secondary/0 group-hover:text-secondary/60 transition-all duration-500 absolute -bottom-10">Neutral</span>
</button>
<!-- Agree - Large Circle (Selected State) -->
<button class="group flex flex-col items-center gap-6">
<div class="w-10 h-10 rounded-full bg-primary border border-primary shadow-xl shadow-primary/10 transition-all duration-500 relative">
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-1 h-1 bg-white rounded-full"></div>
</div>
</div>
<span class="text-[9px] uppercase tracking-[0.2em] font-bold text-primary absolute -bottom-10">Agree</span>
</button>
<!-- Strongly Agree - Largest Circle -->
<button class="group flex flex-col items-center gap-6">
<div class="w-12 h-12 rounded-full border border-primary/20 bg-background group-hover:bg-primary group-hover:border-primary transition-all duration-500"></div>
<span class="text-[9px] uppercase tracking-[0.2em] font-medium text-secondary/0 group-hover:text-secondary/60 transition-all duration-500 absolute -bottom-10">Strongly Agree</span>
</button>
</div>
</div>
</div>
<!-- Action Controls -->
<div class="fixed bottom-12 w-full max-w-4xl px-6 flex justify-between items-center">
<button class="flex items-center gap-3 text-secondary/60 hover:text-primary transition-colors text-sm group">
<span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform">west</span>
<span class="font-medium tracking-wide">Back</span>
</button>
<div class="flex items-center gap-8">
<button class="text-secondary/40 hover:text-secondary transition-colors text-[11px] uppercase tracking-[0.2em] font-semibold">
                    Save Draft
                </button>
<button class="px-12 py-4 bg-primary text-white text-sm font-semibold tracking-[0.1em] hover:bg-tertiary transition-all duration-500 flex items-center gap-4 group">
<span>CONTINUE</span>
<span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">east</span>
</button>
</div>
</div>
<!-- Subtle Brand Detail -->
<div class="fixed left-12 top-1/2 -rotate-90 origin-left hidden lg:block">
<span class="text-[10px] uppercase tracking-[0.5em] font-light text-secondary/30">Aeronaut Strategic Navigator</span>
</div>
</main>
<!-- Visual Polish: Subtle Grain Overlay -->
<div class="pointer-events-none fixed inset-0 z-50 opacity-[0.03] mix-blend-multiply bg-[url('https://www.transparenttextures.com/patterns/asfalt-light.png')]"></div>
</body></html>
